name: Security & Functional Audit

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  audit:
    name: Run Complete Audit
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install Dependencies
        run: uv sync --all-groups

      - name: Check Code Formatting
        run: uv run ruff format --check .

      - name: Lint Code
        run: uv run ruff check .

      - name: Security Scan (Bandit)
        run: uv run bandit -r . -x ./.venv,./tests -ll

      - name: Type Checking (mypy)
        run: uv run mypy --ignore-missing-imports .

      - name: Run Functional Tests (pytest)
        env:
          MPLBACKEND: Agg
        run: uv run pytest
